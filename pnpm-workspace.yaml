packages:
  - "crates/solidity/outputs/npm/package"
  - "crates/solidity/outputs/npm/tests"
  - "crates/solidity/testing/perf/npm"
  - "documentation/public/user-guide"

catalog:
  "@bytecodealliance/preview2-shim": "^0.19.0"
  "@changesets/changelog-github": "^0.7.0"
  "@changesets/cli": "^2.31.0"
  "@ignored/slang-jco": "^1.9.1-slang.1"
  "@openzeppelin/contracts": "^5.6.1"
  "@solidity-parser/parser": "^0.20.1"
  "@types/command-line-args": "^5.2.3"
  "@types/command-line-usage": "^5.0.4"
  "@types/jest": "^30.0.0"
  "@types/node": "^24.12.4"
  "command-line-args": "^6.0.2"
  "command-line-usage": "^7.0.4"
  "cspell": "^10.0.1"
  "jest": "^30.4.2"
  "markdown-link-check": "^3.14.2"
  "markdownlint-cli": "^0.49.0"
  "prettier-plugin-sh": "^0.18.1"
  "prettier": "^3.8.3"
  "solc": "^0.8.36"
  "ts-jest-resolver": "^2.0.1"
  "ts-jest": "^29.4.11"
  "tsx": "^4.22.4"
  "typedoc": "^0.28.19"
  "typescript": "^6.0.0"

overrides:
  # Temporary fixes until our dependencies are updated:
  "@babel/core@<7.29.6": "^7.29.6" # GHSA-4x5r-pxfx-6jf8
  "brace-expansion": "^5.0.6" # GHSA-f886-m6hf-6m8v, GHSA-jxxr-4gwj-5jf2
  "esbuild@<0.28.1": "^0.28.1" # GHSA-gv7w-rqvm-qjhr, GHSA-g7r4-m6w7-qqqr
  # js-yaml 3.x is left alone: the fix only exists in 4.2.0 and @istanbuljs/load-nyc-config pins the 3.x safeLoad API.
  "js-yaml@>=4.0.0 <4.2.0": "^4.2.0" # GHSA-h67p-54hq-rp68
  "markdown-it@<14.2.0": "^14.2.0" # GHSA-6v5v-wf23-fmfq
  "tmp@<=0.2.3": "^0.2.4" # GHSA-52f5-9888-hmc6
  "undici@<7.28.0": "^7.28.0" # GHSA-vxpw-j846-p89q, GHSA-hm92-r4w5-c3mj, GHSA-vmh5-mc38-953g, GHSA-pr7r-676h-xcf6, GHSA-p88m-4jfj-68fv, GHSA-g8m3-5g58-fq7m, GHSA-35p6-xmwp-9g52

# Dependency Resolution
minimumReleaseAge: 10080 # 1 week
minimumReleaseAgeExclude:
  # Security: pull js-yaml 4.2.0 (GHSA-h67p-54hq-rp68) before cooldown matures.
  # Published 2026-06-26 — remove this entry after 2026-07-03 (7-day cooldown).
  - "js-yaml"
  - "solc" # Need to add support for/test against new language versions as they are released:

# Store Settings
storeDir: ".hermit/.pnpm-store"

# CLI Settings
engineStrict: true
packageManagerStrictVersion: true

# Build Settings
ignoreScripts: true
ignoreDepScripts: true
verifyDepsBeforeRun: "error"
strictDepBuilds: true

# Other Settings
catalogMode: "strict"
cleanupUnusedCatalogs: true
