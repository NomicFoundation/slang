# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "cargo"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"
      # Major updates are left as individual PRs: they often need code
      # changes (e.g. nom 7→8, ariadne 0.2→0.6) which would block a group.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "github-actions"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      github-actions-all:
        patterns:
          - "*"
        # Includes majors.

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "npm"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 30
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "pip"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
      semver-major-days: 30
    ignore:
      # Frozen pending migration evaluation: https://github.com/NomicFoundation/slang/issues/1623
      - dependency-name: "mkdocs"
      - dependency-name: "mkdocs-material"
      - dependency-name: "mkdocs-literate-nav"
      - dependency-name: "mkdocs-minify-plugin"
      - dependency-name: "mkdocs-pymdownx-material-extras"
      - dependency-name: "mike"
    groups:
      pip-minor-patch:
        update-types:
          - "minor"
          - "patch"
