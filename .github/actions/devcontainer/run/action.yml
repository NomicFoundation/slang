name: "devcontainer/run"

inputs:
  runCmd:
    type: "string"
    required: true

  env:
    type: "string"
    default: ""

runs:
  using: "composite"
  steps:
    - name: "Run in devcontainer"
      uses: "devcontainers/ci@b63b30de439b47a52267f241112c5b453b673db5" # v0.3.1900000449
      with:
        configFile: ".devcontainer/devcontainer.json"
        env: |
          CI
          ${{ inputs.env }}
        push: "never"
        runCmd: "${{ inputs.runCmd }}"
