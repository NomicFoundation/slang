name: "common-setup"
description: >
  Shared CI setup: frees disk space, restores file mtimes and (optionally) the
  dependency/cargo-target caches, sets up SFW, and runs 'infra setup' for the
  requested tools. The caller must check out the repository before using this
  action (local actions are only resolvable post-checkout).

inputs:
  setup-tools:
    description: >
      Tools to pass to 'infra setup' (e.g. "cargo", "cargo pipenv", "cargo npm").
      Empty (the default) runs a bare 'infra setup' (all tools).
    required: false
    default: ""
  sfw-optional:
    description: >
      Passed to setup-sfw's 'optional'. Defaults to "false" (SFW required: a failed
      install fails the job rather than running unprotected). Set "true" for
      best-effort jobs where a socket.dev outage must not fail the run.
    required: false
    default: "false"
  restore-mtime:
    description: 'Whether to restore file mtimes from git ("true"/"false").'
    required: false
    default: "true"
  restore-deps-cache:
    description: 'Whether to restore the dependencies cache ("true"/"false").'
    required: false
    default: "true"
  restore-target-cache:
    description: 'Whether to restore the cargo-target cache ("true"/"false").'
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: "Free up disk space"
      uses: "./.github/actions/free-disk-space"

    - name: "Restore file mtimes from git"
      if: "${{ inputs.restore-mtime == 'true' }}"
      uses: "./.github/actions/git/restore-mtime"

    - name: "Restore Dependencies Cache"
      if: "${{ inputs.restore-deps-cache == 'true' }}"
      uses: "./.github/actions/cache/dependencies/restore"

    - name: "Restore Cargo Target Cache"
      if: "${{ inputs.restore-target-cache == 'true' }}"
      uses: "./.github/actions/cache/cargo-target/restore"

    - name: "Setup SFW"
      uses: "./.github/actions/setup-sfw"
      with:
        optional: "${{ inputs.sfw-optional }}"

    - name: "infra setup ${{ inputs.setup-tools }}"
      shell: "bash"
      run: "${SFW_PREFIX:-} ./scripts/bin/infra setup ${{ inputs.setup-tools }}"
