name: "cache/cargo-target/save"
description: "Save the Cargo build-artifact (target/) cache."

runs:
  using: "composite"
  steps:
    - name: "Save Cargo Target Cache"
      uses: "actions/cache/save@caa296126883cff596d87d8935842f9db880ef25" # v5.1.0
      with:
        # __SLANG_CI_CACHE_CARGO_TARGET_PATHS__ (keep in sync)
        key: "cargo-target-${{ runner.os }}-v1-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}"
        path: |
          target/
          crates/infra/cli/target/
