name: "cache/save"

runs:
  using: "composite"
  steps:
    - name: "Save Cache"
      uses: "actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7" # v5.0.4
      with:
        # __SLANG_CI_CACHE_PATHS__ (keep in sync)
        key: "cache-${{ github.ref_name }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('Pipfile.lock') }}"
        path: |
          ~/.cache/hermit/
          ~/.local/share/virtualenvs/
          .hermit/
          ~/.cargo/registry/
          ~/.cargo/git/
          ~/.local/share/pnpm/store/
