name: "cache/dependencies/restore"

runs:
  using: "composite"
  steps:
    - name: "Restore Dependencies Cache"
      uses: "actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
      with:
        # __SLANG_CI_CACHE_BENCHMARKS_PATHS__ (keep in sync)
        key: "benchmarks-${{ runner.os }}-v1-${{ hashFiles('Cargo.lock') }}"
        path: |
          .hermit/rust/bin/
        restore-keys: |
          benchmarks-${{ runner.os }}-v1-
