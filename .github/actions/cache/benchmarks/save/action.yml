name: "cache/dependencies/save"

runs:
  using: "composite"
  steps:
    - name: "Save Dependencies Cache"
      uses: "actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
      with:
        # __SLANG_CI_CACHE_BENCHMARKS_PATHS__ (keep in sync)
        key: "benchmarks-${{ runner.os }}-v1-${{ hashFiles('Cargo.lock') }}"
        path: |
          .hermit/rust/bin/
