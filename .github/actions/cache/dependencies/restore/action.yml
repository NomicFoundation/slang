name: "cache/dependencies/restore"

runs:
  using: "composite"
  steps:
    - name: "Restore Dependencies Cache"
      uses: "actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7" # v5.0.4
      with:
        # __SLANG_CI_CACHE_DEPENDENCIES_PATHS__ (keep in sync)
        key: "dependencies-${{ runner.os }}-v1-${{ github.ref_name }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('Pipfile.lock') }}"
        path: |
          ~/.cache/hermit/
          ~/.local/share/virtualenvs/
          .hermit/
          ~/.cargo/registry/
          ~/.cargo/git/
          ~/.local/share/pnpm/store/
        restore-keys: |
          dependencies-${{ runner.os }}-v1-${{ github.ref_name }}-
          dependencies-${{ runner.os }}-v1-main-
          dependencies-${{ runner.os }}-v1-
