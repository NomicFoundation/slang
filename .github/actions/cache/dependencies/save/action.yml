name: "cache/dependencies/save"
description: "Save the dependencies cache (Hermit, cargo registry/git, pnpm store, Python virtualenvs)."

runs:
  using: "composite"
  steps:
    - name: "Save Dependencies Cache"
      uses: "actions/cache/save@caa296126883cff596d87d8935842f9db880ef25" # v5.1.0
      with:
        # __SLANG_CI_CACHE_DEPENDENCIES_PATHS__ (keep in sync)
        key: "dependencies-${{ runner.os }}-v1-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('Pipfile.lock') }}-${{ github.sha }}"
        path: |
          ~/.cache/hermit/
          ~/.local/share/virtualenvs/
          .hermit/
          ~/.cargo/registry/
          ~/.cargo/git/
          ~/.local/share/pnpm/store/
