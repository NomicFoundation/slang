name: "Publish — prepare"
description: "Build the npm publish artifacts (or mark SKIPPED when the local version is already on npm)."

outputs:
  artifact-name:
    description: "Workflow artifact name (versioned + commit-tagged); always set."
    value: "${{ steps.prepare.outputs.artifact-name }}"
  tarball-name:
    description: "Packed npm tarball filename; empty when nothing was packed (version already on npm). The downstream npm steps gate on this being non-empty."
    value: "${{ steps.prepare.outputs.tarball-name }}"

runs:
  using: "composite"
  steps:
    - name: "infra publish prepare"
      id: "prepare"
      shell: "bash"
      run: "./scripts/bin/infra publish prepare"
