name: "Publish — npm tarball"
description: "Publish the prebuilt npm tarball from target/publish-artifacts/. No-op when prepare wrote a .skipped marker."

inputs:
  dry-run:
    description: "If 'true', pass --dry-run to pnpm publish."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: "Publish npm tarball"
      shell: "bash"
      env:
        DRY_RUN: "${{ inputs.dry-run }}"
      run: |
        shopt -s nullglob
        TARBALLS=(target/publish-artifacts/*.tgz)
        if [ "${#TARBALLS[@]}" -eq 0 ]; then
          echo "No tarball in target/publish-artifacts/; nothing to publish."
          exit 0
        fi
        if [ "${#TARBALLS[@]}" -ne 1 ]; then
          echo "Expected exactly one .tgz, found ${#TARBALLS[@]}: ${TARBALLS[*]}"
          exit 1
        fi
        FLAGS=(--access public --no-git-checks)
        # CI checkout is detached HEAD; pnpm's branch check would reject it.
        # The workflow's `branches:` filter and the slang-release environment
        # gate are what actually authorize a release.
        if [ "${DRY_RUN}" = "true" ]; then
          FLAGS+=(--dry-run)
        fi
        echo "Publishing ${TARBALLS[0]} with flags: ${FLAGS[*]}"
        pnpm publish "${TARBALLS[0]}" "${FLAGS[@]}"
