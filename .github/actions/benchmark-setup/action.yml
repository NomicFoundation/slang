name: "benchmark-setup"
description: >
  Shared setup for the benchmark workflows: frees disk space, restores file
  mtimes and the dependency/cargo-target caches, sets up SFW (optional), and runs
  'infra setup' for the requested tools. The caller must check out the repository
  before using this action (local actions are only resolvable post-checkout).

inputs:
  tools:
    description: >
      The tools to pass to 'infra setup' (e.g. "cargo", "cargo pipenv", "cargo npm").
    required: false
    default: "cargo"

runs:
  using: "composite"
  steps:
    - name: "Free up disk space"
      uses: "./.github/actions/free-disk-space"

    - name: "Restore file mtimes from git"
      uses: "./.github/actions/git/restore-mtime"

    - name: "Restore Dependencies Cache"
      uses: "./.github/actions/cache/dependencies/restore"

    - name: "Restore Cargo Target Cache"
      uses: "./.github/actions/cache/cargo-target/restore"

    - name: "Setup SFW (optional)"
      uses: "./.github/actions/setup-sfw"
      with:
        optional: "true"

    - name: "infra setup ${{ inputs.tools }}"
      shell: "bash"
      run: "${SFW_PREFIX:-} ./scripts/bin/infra setup ${{ inputs.tools }}"
