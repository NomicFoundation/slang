name: "benchmark_npm"

on:
  # Run using manual triggers from GitHub UI:
  # https://docs.github.com/en/actions/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Attempt a local run and report results here, without updating the bencher dashboard."
        type: "boolean"
        required: true
        default: true

      bencherProject:
        description: "Bencher project:"
        type: "string"

  # Run on pushes to 'main' branch:
  push:
    branches:
      - "main"

  # Run on pull requests (smoke test always, full benchmark with 'ci:perf' label):
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "labeled"

# Queue up benchmark workflows for the same branch, so that results are reported in order:
concurrency:
  group: "${{ github.workflow }}-${{ github.ref_name }}"
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: "ubuntu-24.04" # _SLANG_DEV_CONTAINER_BASE_IMAGE_ (keep in sync)

    # Only run on the main repo (not forks), unless it is a dry run or a PR:
    if: "${{ github.event_name == 'pull_request' || github.repository == 'NomicFoundation/slang' || inputs.dryRun == true }}"

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683"
        with:
          persist-credentials: false

      - name: "Restore Cache"
        uses: "./.github/actions/cache/restore"

      - name: "Set bencher project"
        run: |
          echo "SLANG_BENCHER_PROJECT=${{ inputs.bencherProject }}" >> $GITHUB_ENV
        if: "${{ inputs.bencherProject }}"

      - name: "infra setup"
        run: "./scripts/bin/infra setup"

      - name: "infra check npm"
        run: "./scripts/bin/infra check npm"

      - name: "Smoke Test > infra perf npm --smoke"
        if: "${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci:perf') }}"
        run: "./scripts/bin/infra perf npm --smoke"

      # PRs always use --dry-run (run benchmarks locally but don't upload to bencher dashboard):
      - name: "Benchmark > infra perf npm"
        if: "${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:perf') }}"
        run: "./scripts/bin/infra perf npm ${{ (inputs.dryRun == true || github.event_name == 'pull_request') && '--dry-run' || '' }}"
        env:
          BENCHER_API_TOKEN: "${{ secrets.BENCHER_API_TOKEN }}"
