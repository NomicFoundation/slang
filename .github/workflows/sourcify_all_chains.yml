name: "sourcify_all_chains"

on:
  workflow_dispatch:
    inputs:
      check_infer_version:
        description: "Check that we can infer the correct language version based on the available version pragmas."
        type: "boolean"
        required: false
        default: false
      check_binder:
        description: "Check name bindings on contracts reporting if there's any unresolved symbol."
        type: "choice"
        required: true
        default: "none"
        options:
          - "none"
          - "v1"
          - "v2"
          - "compare"

  # Run on pull requests (smoke test always, full run with 'ci:sourcify' label):
  pull_request:
    types: ["opened", "synchronize", "reopened", "labeled"]

jobs:
  smoke:
    runs-on: "ubuntu-24.04" # _SLANG_DEV_CONTAINER_BASE_IMAGE_ (keep in sync)

    # Smoke test on PRs; skip on dispatch (the full test runs there):
    if: "${{ github.event_name == 'pull_request' }}"

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683"
        with:
          persist-credentials: false

      - name: "Restore Cache"
        uses: "./.github/actions/cache/restore"

      - name: "Smoke Test > Build sourcify binary"
        run: "./scripts/bin/with-hermit cargo build --bin solidity_testing_sourcify"

  run_tests:
    # On PRs: only run when 'ci:sourcify' label is present. On dispatch: always run.
    if: >-
      ${{ github.event_name != 'pull_request'
        || contains(github.event.pull_request.labels.*.name, 'ci:sourcify') }}
    uses: "./.github/workflows/sourcify_single_chain.yml"
    with:
      chain_id: "${{ matrix.chain_id }}"
      check_infer_version: "${{ inputs.check_infer_version }}"
      check_binder: "${{ inputs.check_binder }}"
    strategy:
      fail-fast: false
      matrix:
        chain_id:
          - 1 # Ethereum Mainnet
          - 42161 # Arbitrum One
          - 8453 # Base
          - 137 # Polygon Mainnet
