name: "sourcify_smoke"

on:
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref_name }}"

jobs:
  smoke:
    runs-on: "ubuntu-24.04" # _SLANG_DEV_CONTAINER_BASE_IMAGE_ (keep in sync)

    permissions:
      contents: "read"

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10" # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0 # Full history is needed by 'git/restore-mtime' to find each file's last commit time.

      - name: "Common Setup"
        uses: "./.github/actions/common-setup"
        with:
          infra-setup: "false"
          sfw-optional: "true"

      - name: "Smoke Test > Build sourcify binary"
        run: "${SFW_PREFIX:-} ./scripts/bin/with-hermit cargo build --locked --bin solidity_testing_sourcify"
