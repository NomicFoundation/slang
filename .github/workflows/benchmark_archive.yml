name: "benchmark_archive"

on:
  pull_request:
    types:
      - "closed"

jobs:
  archive:
    runs-on: "ubuntu-24.04"

    # Only run for same-repo PRs (fork PRs never created bencher branches):
    if: "${{ github.event.pull_request.head.repo.full_name == github.repository }}"

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683"
        with:
          persist-credentials: false

      - name: "Restore Cache"
        uses: "./.github/actions/cache/restore"

      - name: "Install bencher CLI"
        run: "./scripts/bin/infra setup cargo"

      - name: "Archive PR branches in bencher"
        continue-on-error: true
        env:
          BENCHER_API_TOKEN: "${{ secrets.BENCHER_API_TOKEN }}"
        run: |
          bencher archive \
            --project slang-dashboard-cargo-slang \
            --branch "$GITHUB_HEAD_REF"
          bencher archive \
            --project slang-dashboard-cargo-cmp \
            --branch "$GITHUB_HEAD_REF"
          bencher archive \
            --project slang-dashboard-npm \
            --branch "$GITHUB_HEAD_REF"
