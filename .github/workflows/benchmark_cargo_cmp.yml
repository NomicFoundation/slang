name: "benchmark_cargo_cmp"

on:
  # Run using manual triggers from GitHub UI:
  # https://docs.github.com/en/actions/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Attempt a local run and report results here, without updating the bencher dashboard."
        type: "boolean"
        required: true
        default: true

      bencherProject:
        description: "Bencher project:"
        type: "string"

  # Run on pushes to 'main' branch:
  push:
    branches:
      - "main"

  # Run on pull requests (smoke test always, full benchmark with 'ci:perf' label):
  pull_request:
    types:
      - "opened"
      - "synchronize"
      - "reopened"
      - "labeled"

permissions: {}

# Queue benchmark workflows for the same branch (main pushes queue for ordered results; PR runs cancel stale ones):
concurrency:
  group: "${{ github.workflow }}-${{ github.ref_name }}"
  cancel-in-progress: "${{ github.event_name == 'pull_request' }}"

jobs:
  benchmark:
    runs-on: "ubuntu-24.04" # _SLANG_DEV_CONTAINER_BASE_IMAGE_ (keep in sync)

    permissions:
      contents: "read"

    # Skip fork PRs (can't access BENCHER_API_TOKEN). For non-PR events, only run on the main repo.
    if: >-
      ${{
        (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        || (github.event_name != 'pull_request' && (github.repository == 'NomicFoundation/slang' || inputs.dryRun == true))
      }}

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683" # v4.2.2
        with:
          persist-credentials: false

      - name: "Restore Cache"
        uses: "./.github/actions/cache/restore"

      - name: "infra setup cargo pipenv"
        run: "./scripts/bin/infra setup cargo pipenv"

      - name: "Set bencher project"

        run: |
          echo "SLANG_BENCHER_PROJECT=${{ inputs.bencherProject }}" >> $GITHUB_ENV
        if: "${{ inputs.bencherProject }}"

      - name: "Smoke Test > infra perf cargo --smoke comparison"
        if: "${{ github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'ci:perf') }}"
        run: "./scripts/bin/infra perf cargo --smoke comparison"

      - name: "Benchmark > infra perf cargo comparison"
        if: "${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:perf') }}"
        run: "./scripts/bin/infra perf cargo ${{ github.event_name == 'pull_request' && '--pr-benchmark' || (inputs.dryRun == true && '--dry-run' || '') }} comparison"
        env:
          BENCHER_API_TOKEN: "${{ secrets.BENCHER_API_TOKEN }}"
          BENCHER_PR_START_POINT_HASH: "${{ github.event.pull_request.base.sha }}"
          BENCHER_PR_HEAD_HASH: "${{ github.event.pull_request.head.sha }}"

      - name: "Benchmark > Upload Benchmarking Data"
        if: "${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'ci:perf') }}"
        uses: "actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02" # v4.6.2
        with:
          name: "benchmarking-data"
          path: "target/iai"
          if-no-files-found: "error"
