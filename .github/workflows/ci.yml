name: "ci"

on:
  # Run using manual triggers from GitHub UI:
  # https://docs.github.com/en/actions/managing-workflow-runs/manually-running-a-workflow
  workflow_dispatch: {}

  # Run on every pull request:
  pull_request: {}

  # Run on merge queue validation:
  merge_group: {}

  # Run on pushes to 'main' to refresh the CI cache from scratch, so that it doesn't grow indefinitely:
  push:
    branches:
      - "main"

permissions:
  contents: "read"

# In the event that there is a new push to the ref, cancel any running jobs because they are now obsolete, wasting resources.
concurrency:
  group: "${{ github.workflow }}-${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  ci:
    runs-on: "ubuntu-22.04" # _SLANG_DEV_CONTAINER_BASE_IMAGE_ (keep in sync)

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683"
        with:
          persist-credentials: false
          # Full history is needed by git-restore-mtime below to find each file's last commit time.
          fetch-depth: 0

      # git checkout sets all file mtimes to "now", which invalidates cached cargo fingerprints
      # and causes unnecessary recompilation. This restores mtimes to each file's last commit time,
      # so unchanged files match the cached fingerprints and cargo skips recompilation.
      - name: "Restore file mtimes from git"
        uses: "chetan/git-restore-mtime-action@d186aca54f8760da4dec55313195e51ed3ebb0b3" # v2.3

      # Cache is updated in this workflow, and reused in subsequent workflows.
      # Always start with a fresh cache when running on the main branch.
      - name: "Restore Cache"
        if: "${{ github.ref_name != 'main' }}"
        uses: "./.github/actions/cache/restore"

      # Restore compiled Rust artifacts from a previous build on main.
      - name: "Restore Cargo Target Cache"
        if: "${{ github.ref_name != 'main' }}"
        uses: "actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830" # v4.3.0
        with:
          path: |
            target/
            crates/infra/cli/target/
          key: "cargo-target-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}"
          restore-keys: |
            cargo-target-${{ runner.os }}-

      #
      # Run all CI steps in order: _SLANG_INFRA_CI_STEPS_ORDERED_ (keep in sync)
      #

      - name: "infra setup"
        run: "./scripts/bin/infra setup"

      - name: "infra check"
        run: "./scripts/bin/infra check"

      - name: "infra test"
        run: "./scripts/bin/infra test"

      - name: "infra lint"
        run: "./scripts/bin/infra lint"

      - name: "Save Cargo Target Cache"
        if: "${{ github.ref == 'refs/heads/main' }}"
        uses: "actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830" # v4.3.0
        with:
          path: |
            target/
            crates/infra/cli/target/
          key: "cargo-target-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}"

      - name: "Save Cache"
        if: "${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref_name == 'main' }}"
        uses: "./.github/actions/cache/save"

  # We cannot run the full CI in devcontainers, as we will run out of disk space in GitHub Actions.
  # Instead, we just validate the devcontainer is built correctly by running a minimal check below.
  validate-devcontainer:
    runs-on: "ubuntu-22.04" # _SLANG_DEV_CONTAINER_BASE_IMAGE_ (keep in sync)

    steps:
      - name: "Checkout Repository"
        uses: "actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683"
        with:
          persist-credentials: false

      - name: "infra setup pipenv"
        uses: "./.github/actions/devcontainer/run"
        with:
          runCmd: "./scripts/bin/infra setup pipenv"

      - name: "infra lint mkdocs"
        uses: "./.github/actions/devcontainer/run"
        with:
          runCmd: "./scripts/bin/infra lint mkdocs"
